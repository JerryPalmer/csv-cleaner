name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Runner diagnostics (debug)
        run: |
          echo "=== Runner info ==="
          uname -a || true
          lsb_release -a 2>/dev/null || true
          echo "=== Environment ==="
          env | sort
          echo "=== Disk usage ==="
          df -h || true
          echo "=== Python & pip ==="
          python --version || true
          python -m pip --version || true
          echo "=== pip list ==="
          python -m pip list || true
          echo "=== Workspace files ==="
          ls -la || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Smoke test script
        run: |
          # run the cleaner on the included sample to verify it executes
          python clean_csv.py sample.csv cleaned-ci.csv --quiet
          ls -l cleaned-ci.csv || true
